name: dotnet-tool-publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish package to NuGet.org'
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-test-pack:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ElBruno.PresenterTimer.sln

      - name: Build
        run: dotnet build ElBruno.PresenterTimer.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ElBruno.PresenterTimer.sln --configuration Release --no-build

      - name: Pack NuGet package
        run: dotnet pack src\ElBruno.PresenterTimer.Tool\ElBruno.PresenterTimer.Tool.csproj --configuration Release --no-build --output artifacts

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts\*.nupkg
          if-no-files-found: error

  publish-nuget:
    needs: build-test-pack
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet.org
        shell: bash
        run: |
          for pkg in artifacts/*.nupkg; do
            dotnet nuget push "$pkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

  create-release:
    needs: publish-nuget
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and generate release notes
        id: release-info
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
            
          # Get previous tag for changelog
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            # First release - use all commits
            CHANGELOG=$(git log --pretty="- %s (%h)" --reverse)
          else
            # Get commits since last tag
            CHANGELOG=$(git log "$PREV_TAG..$VERSION" --pretty="- %s (%h)" --reverse)
          fi
            
          # Escape newlines for GitHub Actions output
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
         tag_name: ${{ steps.release-info.outputs.version }}
         name: ${{ steps.release-info.outputs.version }} - ElBruno.PresenterTimer
         body: |
           ## Release ${{ steps.release-info.outputs.version }}
            
           ### 📦 NuGet Package
           Published to: https://www.nuget.org/packages/ElBruno.PresenterTimer/${{ steps.release-info.outputs.version }}
            
           Install or update:
           ```bash
           dotnet tool install --global ElBruno.PresenterTimer --version ${{ steps.release-info.outputs.version }}
           # or
           dotnet tool update --global ElBruno.PresenterTimer
           ```
            
           ### 📝 Changelog
           ${{ steps.release-info.outputs.changelog }}
         draft: false
         prerelease: false
