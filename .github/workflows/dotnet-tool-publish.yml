name: dotnet-tool-publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish package to NuGet.org'
        required: true
        type: boolean
        default: false

jobs:
  build-test-pack:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ElBruno.PresenterTimer.sln

      - name: Build
        run: dotnet build ElBruno.PresenterTimer.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ElBruno.PresenterTimer.sln --configuration Release --no-build

      - name: Pack dotnet tool
        run: dotnet pack src\ElBruno.PresenterTimer\ElBruno.PresenterTimer.csproj --configuration Release --no-build --output artifacts

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts\*.nupkg
          if-no-files-found: error

  publish-nuget:
    needs: build-test-pack
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    runs-on: windows-latest
    environment: nuget
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish to NuGet.org (trusted publisher)
        run: dotnet nuget push "artifacts\*.nupkg" --source https://api.nuget.org/v3/index.json --skip-duplicate
